jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ① actions/checkout — clones your repo onto the runner
      # You MUST do this before accessing any of your code!
      - name: Checkout code
        uses: actions/checkout@v4

      # ② actions/setup-node — installs a specific Node.js version
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:                          # 'with' passes inputs to the action
          node-version: '20'
          cache: 'npm'                  # automatically caches node_modules!

      # ③ Now you can run npm commands
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build