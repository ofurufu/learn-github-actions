jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the app
        run: |
          mkdir -p dist
          echo "Binary content" > dist/app
          echo "1.0.${{ github.run_number }}" > dist/version.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output                  # artifact name
          path: dist/                         # what to upload
          retention-days: 7                  # how long to keep it

  deploy:
    runs-on: ubuntu-latest
    needs: build                             # must run after build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./downloaded-dist

      - name: Deploy
        run: |
          VERSION=$(cat ./downloaded-dist/version.txt)
          echo "Deploying version $VERSION"